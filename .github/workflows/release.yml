name: Release to PyPI

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      publish_pypi:
        description: 'Publish package to PyPI? Note: publishing only runs on tags; build can run on branches for verification.'
        required: true
        type: boolean
        default: false

jobs:
  build_packages:
    name: build wheel & source distribtions
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest ]
        python-version: [ '3.10' ]
    steps:
      - name: checkout repository
        uses: actions/checkout@v4
      - name: install Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: load cached Python installation
        id: cache
        uses: actions/cache@v4
        with:
          path: ${{ env.pythonLocation }}
          key: build-${{ runner.os }}-${{ env.pythonLocation }}-${{ hashFiles('pyproject.toml', 'setup.*') }}
      - name: install build package
        run: pip install build
      - name: build package
        run: python -m build
      - name: save builds
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: ./dist
  upload_pypi:
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.publish_pypi == true)
    name: publish to PyPI
    needs: [ build_packages ]
    runs-on: ubuntu-latest
    steps:
      # Explicit tag-only guard for publish; gives a clear failure on branch runs.
      - name: assert tag-only run
        shell: bash
        run: |
          echo "Note: publishing only runs on tags."
          if [[ "${GITHUB_REF}" != refs/tags/* ]]; then
            echo "::error::Publishing is tag-only. Current ref: ${GITHUB_REF}"
            exit 1
          fi
          echo "Tag detected: ${GITHUB_REF#refs/tags/}"
      - name: retrieve wheel(s) and source
        uses: actions/download-artifact@v4
        with:
          name: build
          path: dist
      - name: upload wheel(s) and source
        uses: pypa/gh-action-pypi-publish@v1.5.0
        with:
          user: __token__
          password: ${{ secrets.PYPI_TOKEN }}
